# ────────────────────────────────────────────────────────────
# Terminal / display
# ────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,*256col*:RGB,alacritty:RGB"
set -g mouse on
set -g history-limit 50000
set -g focus-events on
set -sg escape-time 10
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g set-titles on
set -g set-titles-string "#S / #W"
set -g status-interval 5

# ────────────────────────────────────────────────────────────
# Plugins (TPM)
# ────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# ────────────────────────────────────────────────────────────
# Status bar layout (colors/content come from the theme file)
# ────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-left-length 100
set -g status-right-length 100

# ────────────────────────────────────────────────────────────
# Vim-style keybinds
# ────────────────────────────────────────────────────────────
# Vi mode in copy-mode and for the status-line prompt.
setw -g mode-keys vi
set -g status-keys vi

# Alt + h/j/k/l moves between panes (no prefix needed — -n binds to root table).
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Alt + Shift + h/j/k/l resizes the current pane (no prefix).
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 3
bind -n M-K resize-pane -U 3
bind -n M-L resize-pane -R 5

# Copy-mode: vim selection/yank.
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel

# Right-click pastes the tmux buffer instead of opening the context menu.
unbind -n MouseDown3Pane
bind -n MouseDown3Pane paste-buffer -p

# ────────────────────────────────────────────────────────────
# Theme (symlink managed by the zsh `theme` command)
# ────────────────────────────────────────────────────────────
source-file -q ~/.config/tmux/theme.conf

# Initialize TMUX plugin manager (keep at very bottom)
run '~/.config/tmux/plugins/tpm/tpm'
