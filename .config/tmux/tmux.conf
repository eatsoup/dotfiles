# ────────────────────────────────────────────────────────────
# Terminal / display
# ────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,*256col*:RGB,alacritty:RGB"
set -g mouse on
set -g history-limit 50000
set -g focus-events on
set -sg escape-time 10
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g set-titles on
set -g set-titles-string "#S / #W"
set -g status-interval 5

# ────────────────────────────────────────────────────────────
# Plugins (TPM)
# ────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# ────────────────────────────────────────────────────────────
# Catppuccin (Mocha) styling
# ────────────────────────────────────────────────────────────
set -g @catppuccin_flavor 'mocha'

# Windows: rounded separators, show number + name + current command
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text " #W#{?window_zoomed_flag, 󰊓 ,}"
set -g @catppuccin_window_current_background "#{@thm_peach}"

# Status bar layout
set -g status-position top
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_host}"
set -agF status-right "#{E:@catppuccin_status_date_time}"

set -g @catppuccin_date_time_text " %Y-%m-%d  %H:%M"

# Pane borders
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#cba6f7"

# Initialize TMUX plugin manager (keep at very bottom)
run '~/.config/tmux/plugins/tpm/tpm'
