"$schema" = "https://starship.rs/config-schema.json"

palette = "catppuccin_mocha"

#

format = """
$os\
$username\
$directory\
$git_branch\
$git_status\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$docker_context\
$kubernetes\
$time\
$line_break$character
"""

# ----------------
# Palette
# ----------------
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
purple = "#cba6f7"

# ----------------
# Core modules
# ----------------
[os]
disabled = false
style = "fg:text"

[username]
show_always = true
style_user = "fg:text"
style_root = "fg:red"
format = "[ $user ]($style)"

[directory]
style = "fg:peach"
format = "[│](fg:overlay0)[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "📄"
"Downloads" = "⬇️"
"Music" = "🎵"
"Pictures" = "🖼️"
"Developer" = "💻"

# ----------------
# Git
# ----------------
[git_branch]
symbol = ""
format = "[│](fg:overlay0)[ $symbol $branch ](fg:green)"

[git_status]
format = "[( $all_status$ahead_behind )](fg:green)"

# ----------------
# Languages
# ----------------
[nodejs]
format = "[│](fg:overlay0)[ ](fg:teal)"

[c]
format = "[│](fg:overlay0)[C ](fg:teal)"

[rust]
format = "[│](fg:overlay0)[ ](fg:teal)"

[golang]
format = "[│](fg:overlay0)[ ](fg:teal)"

[php]
format = "[│](fg:overlay0)[ ](fg:teal)"

[java]
format = "[│](fg:overlay0)[ ](fg:teal)"

[kotlin]
format = "[│](fg:overlay0)[ ](fg:teal)"

[haskell]
format = "[│](fg:overlay0)[ ](fg:teal)"

[python]
format = "[│](fg:overlay0)[ ](fg:teal)"

# ----------------
# Containers
# ----------------
[docker_context]
format = "[│](fg:overlay0)[ 🐳 ($context) ](fg:blue)"

[kubernetes]
disabled = true
format = "[│](fg:overlay0)[ ☸ ($context) ](fg:blue)"

# ----------------
# Time
# ----------------
[time]
disabled = false
time_format = "%R"
format = "[│](fg:overlay0)[  $time ](fg:purple)"

# ----------------
# Prompt behavior
# ----------------
[line_break]
disabled = false

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[cmd_duration]
min_time = 500
format = "[ took $duration ](fg:yellow)"
