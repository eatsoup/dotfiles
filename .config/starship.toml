"$schema" = "https://starship.rs/config-schema.json"

palette = "catppuccin_mocha"

#

format = """
[](fg:surface0)\ 
$os\
$username\
[](fg:surface0 bg:peach)\
$directory\
[](fg:peach bg:green)\
$git_branch\
$git_status\
[](fg:green bg:teal)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:teal bg:blue)\
$docker_context\
$kubernetes\
[](fg:blue bg:purple)\
$time\
[](fg:purple)\
$line_break$character
"""

# ----------------
# Palette
# ----------------
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
purple = "#cba6f7"

# ----------------
# Core modules
# ----------------
[os]
disabled = false
style = "fg:text bg:surface0"

[username]
show_always = true
style_user = "fg:text bg:surface0"
style_root = "fg:red bg:surface0"
format = "[ $user ]($style)"

[directory]
style = "fg:base bg:peach"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "📄"
"Downloads" = "⬇️"
"Music" = "🎵"
"Pictures" = "🖼️"
"Developer" = "💻"

# ----------------
# Git
# ----------------
[git_branch]
symbol = ""
format = "[ $symbol $branch ](fg:base bg:green)"

[git_status]
format = "[( $all_status$ahead_behind )](fg:base bg:green)"

# ----------------
# Languages
# ----------------
[nodejs]
format = "[ ](fg:base bg:teal)"

[c]
format = "[C ](fg:base bg:teal)"

[rust]
format = "[ ](fg:base bg:teal)"

[golang]
format = "[ ](fg:base bg:teal)"

[php]
format = "[ ](fg:base bg:teal)"

[java]
format = "[ ](fg:base bg:teal)"

[kotlin]
format = "[ ](fg:base bg:teal)"

[haskell]
format = "[ ](fg:base bg:teal)"

[python]
format = "[ ](fg:base bg:teal)"

# ----------------
# Containers
# ----------------
[docker_context]
format = "[ 🐳 ($context) ](fg:base bg:blue)"

[kubernetes]
disabled = true
format = "[ ☸ ($context) ](fg:base bg:blue)"

# ----------------
# Time
# ----------------
[time]
disabled = false
time_format = "%R"
format = "[  $time ](fg:base bg:purple)"

# ----------------
# Prompt behavior
# ----------------
[line_break]
disabled = false

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[cmd_duration]
min_time = 500
format = "[ took $duration ](fg:yellow)"
