# tmux theme: tokyo-night
#   Sourced by ~/.config/tmux/tmux.conf via the `theme` zsh command.
#   Rounded powerline caps ( ) — same style as the starship prompt.

set -g status-style "bg=#1a1b26,fg=#c0caf5"

set -g status-left "#[fg=#bb9af7,bg=default]#[bg=#bb9af7,fg=#1a1b26,bold]   #S #[fg=#bb9af7,bg=default] "

set -g status-right "#[fg=#565f89]#(whoami)@#h  #[fg=#bb9af7,bg=default]#[bg=#bb9af7,fg=#1a1b26,bold]   %H:%M #[fg=#bb9af7,bg=default]"

set -g window-status-separator " "
set -g window-status-format         "#[fg=#292e42,bg=default]#[bg=#292e42,fg=#c0caf5] #I #W #[fg=#292e42,bg=default]"
set -g window-status-current-format "#[fg=#ff9e64,bg=default]#[bg=#ff9e64,fg=#1a1b26,bold] #I #W #[fg=#ff9e64,bg=default]"

set -g pane-border-style        "fg=#3b4261"
set -g pane-active-border-style "fg=#bb9af7"
set -g message-style            "bg=#292e42,fg=#c0caf5"
set -g mode-style               "bg=#bb9af7,fg=#1a1b26"
