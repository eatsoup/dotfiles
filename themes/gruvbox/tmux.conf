# tmux theme: gruvbox
#   Sourced by ~/.config/tmux/tmux.conf via the `theme` zsh command.
#   Rounded powerline caps ( ) — same style as the starship prompt.

set -g status-style "bg=#282828,fg=#ebdbb2"

set -g status-left "#[fg=#d3869b,bg=default]#[bg=#d3869b,fg=#282828,bold]   #S #[fg=#d3869b,bg=default] "

set -g status-right "#[fg=#928374]#(whoami)@#h  #[fg=#d3869b,bg=default]#[bg=#d3869b,fg=#282828,bold]   %H:%M #[fg=#d3869b,bg=default]"

set -g window-status-separator " "
set -g window-status-format         "#[fg=#3c3836,bg=default]#[bg=#3c3836,fg=#ebdbb2] #I #W #[fg=#3c3836,bg=default]"
set -g window-status-current-format "#[fg=#fe8019,bg=default]#[bg=#fe8019,fg=#282828,bold] #I #W #[fg=#fe8019,bg=default]"

set -g pane-border-style        "fg=#504945"
set -g pane-active-border-style "fg=#d3869b"
set -g message-style            "bg=#3c3836,fg=#ebdbb2"
set -g mode-style               "bg=#d3869b,fg=#282828"
