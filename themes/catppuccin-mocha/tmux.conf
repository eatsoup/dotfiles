# tmux theme: catppuccin-mocha
#   Sourced by ~/.config/tmux/tmux.conf via the `theme` zsh command.
#   Rounded powerline caps ( ) — same style as the starship prompt.

set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name in a rounded mauve pill.
set -g status-left "#[fg=#cba6f7,bg=default]#[bg=#cba6f7,fg=#1e1e2e,bold]   #S #[fg=#cba6f7,bg=default] "

# Right: user@host (plain) + clock in a rounded mauve pill.
set -g status-right "#[fg=#7f849c]#(whoami)@#h  #[fg=#cba6f7,bg=default]#[bg=#cba6f7,fg=#1e1e2e,bold]   %H:%M #[fg=#cba6f7,bg=default]"

# Windows: rounded pills. Inactive = subtle, current = peach.
set -g window-status-separator " "
set -g window-status-format         "#[fg=#313244,bg=default]#[bg=#313244,fg=#cdd6f4] #I #W #[fg=#313244,bg=default]"
set -g window-status-current-format "#[fg=#fab387,bg=default]#[bg=#fab387,fg=#1e1e2e,bold] #I #W #[fg=#fab387,bg=default]"

set -g pane-border-style        "fg=#45475a"
set -g pane-active-border-style "fg=#cba6f7"
set -g message-style            "bg=#313244,fg=#cdd6f4"
set -g mode-style               "bg=#cba6f7,fg=#1e1e2e"
